<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard Proyecto | Veta de Oro (Indra v5.0 Atomic)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/system-navigation.css">
    <script src="../03-system-infra/core/engines/SystemNavigation.js"></script>
    
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/erp/layout.css">
    <link rel="stylesheet" href="../css/erp/buttons.css">
    <link rel="stylesheet" href="../css/erp/quotation.css">

    <style>
        .main-workflow-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: var(--gap-phi-2);
            position: relative;
        }

        /* HUD Phase (Absolute Corner) */
        #indra-phase-mount {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 100;
        }

        .identity-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid var(--color-ink);
            padding-bottom: 20px;
        }

        .designer-container {
            flex: 1;
            min-height: 80vh;
            background: transparent;
        }

        .title-signature { font-family: var(--font-signature); font-size: 2.4rem; color: var(--color-ink); margin: 0; }

        @media (max-width: 900px) {
            .identity-header { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body class="erp-veta axiom-dashboard" data-theme="light">

    <!-- 0. HUD PHASE (BLACK MIRROR) -->
    <div id="indra-phase-mount"></div>

    <div class="main-workflow-area">
        
        <!-- 1. BLOQUE DE IDENTIDAD (DINÁMICO) -->
        <header id="indra-identity-mount" class="identity-header">
            <!-- Inyectado por DashboardRenderer.js -->
        </header>

        <!-- 2. NAV STRIP: ACCIONES TÉCNICAS -->
        <nav class="v-hud-strip v-safe-zone" style="background: transparent; border:none; padding: 0;">
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="axiom-btn axiom-btn-sm axiom-btn-ghost"><i data-lucide="camera"></i> CAPTURAR</button>
                <button class="axiom-btn axiom-btn-sm axiom-btn-ghost"><i data-lucide="file-plus"></i> FILES</button>
                <div class="v-hud-divider" style="height: 15px;"></div>
                <div class="axiom-mic-discrete" id="micBtn" onclick="this.classList.toggle('rec-active')">
                    <i data-lucide="mic"></i><div class="rec-led"></div>
                </div>
                <span class="v-hud-label">INTRA-VOICE</span>
            </div>

            <div style="flex:1"></div>

            <div style="display: flex; gap: 10px;">
                <button class="axiom-btn axiom-btn-brass"><i data-lucide="file-check"></i> FIRMAR CONTRATO</button>
            </div>
        </nav>

        <!-- 3. ÁREA CORE: DISEÑADOR TÉCNICO (INYECTADO) -->
        <main id="indra-quotation-mount" class="designer-container">
            <!-- Inyectado por QuotationRenderer.js -->
        </main>

        <!-- 4. FOOTER: INTELIGENCIA SINTÉTICA -->
        <footer id="indra-intel-mount" class="intelligence-footer" style="margin-top: 40px; padding-bottom: 50px;">
            <!-- Inyectado por IntelRenderer.js -->
        </footer>

    </div>

    <!-- ORQUESTADOR CORE -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
