<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Propuestas | Gestion Interna Veta</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/style-iterator.css">
    <style>
        :root {
            --bg-sinapsis: var(--color-canvas);
            --panel-bg: var(--color-canvas);
            --panel-border: var(--border-hairline);
            --accent: var(--color-brass);
        }
        body {
            background-color: var(--color-canvas);
            color: var(--color-ink);
            font-family: var(--font-rational);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: var(--transition-autor);
        }
        header {
            height: 60px;
            border-bottom: var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--color-canvas);
        }
        .logo { 
            font-family: var(--font-signature); 
            color: var(--accent); 
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        nav {
            width: 260px;
            border-right: var(--panel-border);
            padding: 20px;
            background: var(--color-canvas);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .nav-section h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 15px;
        }
        .space-item {
            padding: 10px;
            border: 1px solid transparent;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            transition: 0.2s;
        }
        .space-item:hover { background: rgba(0,0,0,0.03); }
        .space-item.active { border-color: var(--accent); color: var(--accent); }
        .editor {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background: var(--color-canvas);
        }
        .card-espacio {
            background: var(--color-canvas);
            border: var(--panel-border);
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }
        .card-header input {
            background: transparent;
            border: none;
            border-bottom: var(--border-hairline);
            color: var(--color-ink);
            font-family: var(--font-signature);
            font-size: 1.5rem;
            width: 70%;
            outline: none;
        }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .items-table th {
            text-align: left;
            padding: 10px;
            border-bottom: var(--border-hairline);
            color: var(--accent);
        }
        .items-table td { padding: 8px 5px; }
        .items-table input {
            background: transparent;
            border: var(--border-hairline);
            color: var(--color-ink);
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }
        .items-table input:focus { border-color: var(--accent); }
        .btn-add-line {
            background: transparent;
            border: 1px dashed var(--accent);
            color: var(--accent);
            padding: 10px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.6;
        }
        .btn-add-line:hover { opacity: 1; }
        .variante-control {
            margin-top: 20px;
            padding-top: 20px;
            border-top: var(--border-hairline);
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.75rem;
        }
        .variante-control select {
            background: transparent;
            color: var(--accent);
            border: var(--border-hairline);
            padding: 5px;
        }
        footer {
            height: 80px;
            background: var(--color-canvas);
            border-top: 2px solid var(--accent);
            display: flex;
            align-items: center;
            padding: 0 40px;
            gap: 40px;
        }
        .metric {
            display: flex;
            flex-direction: column;
        }
        .metric label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.5; margin-bottom: 5px; }
        .metric span { font-family: var(--font-technical); font-size: 1.2rem; color: var(--accent); }
        .btn-generate {
            margin-left: auto;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 25px;
            font-family: var(--font-rational);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }
        .delete-btn { color: #551111; cursor: pointer; font-size: 1rem; }
        .delete-btn:hover { color: #ff0000; }
    </style>
</head>
<body>
    <header>
        <div class="logo">GESTIÓN INTERNA VETA</div>
        <div style="font-size: 0.8rem; opacity: 0.6;">Propuesta N° 2026-04-A01 | <span id="client-name">Ana Maria Gonzalez</span></div>
        <button class="btn-generate" onclick="generateJSON()">⚡ Generar Proyección Final</button>
    </header>
    <main>
        <nav>
            <div class="nav-section">
                <h4>Estructura de Espacios</h4>
                <div id="space-list"></div>
                <button class="btn-add-line" style="margin-top: 10px;" onclick="addSpace()">+ Añadir Espacio</button>
            </div>
            <div class="nav-section">
                <h4>Notas y Condiciones</h4>
                <div class="space-item">Vigencia y Tiempos</div>
                <div class="space-item">Garantía Mobiliario</div>
                <div class="space-item">Formas de Pago</div>
            </div>
        </nav>
        <section class="editor" id="editor-main"></section>
    </main>
    <footer>
        <div class="metric">
            <label>Total Base (Consolidado)</label>
            <span id="total-base">$ 0</span>
        </div>
        <div class="metric">
            <label>Delta Variante Alternativa</label>
            <span id="total-delta">$ 0</span>
        </div>
        <div style="flex:1"></div>
        <div style="font-family: var(--font-technical); font-size: 0.7rem; opacity: 0.4;">INDRA SATELLITE CORE v3.2 | Connected</div>
    </footer>
    <script>
        let proposalState = {
            spaces: [
                { id: Date.now(), name: 'Cocina Integral', items: [{desc: '', cant: 1, price: 0}], variante: 'Base' }
            ]
        };
        function addSpace() {
            proposalState.spaces.push({
                id: Date.now(),
                name: 'Nuevo Espacio',
                items: [{desc: '', cant: 1, price: 0}],
                variante: 'Base'
            });
            renderAll();
        }
        function removeSpace(id) {
            proposalState.spaces = proposalState.spaces.filter(s => s.id !== id);
            renderAll();
        }
        function addItem(spaceId) {
            const space = proposalState.spaces.find(s => s.id === spaceId);
            space.items.push({desc: '', cant: 1, price: 0});
            renderAll();
        }
        function removeItem(spaceId, itemIdx) {
            const space = proposalState.spaces.find(s => s.id === spaceId);
            space.items.splice(itemIdx, 1);
            renderAll();
        }
        function updateItem(spaceId, itemIdx, field, value) {
            const space = proposalState.spaces.find(s => s.id === spaceId);
            space.items[itemIdx][field] = field === 'desc' ? value : parseFloat(value) || 0;
            updateTotals();
        }
        function updateTotals() {
            let base = 0;
            let alt = 0;
            proposalState.spaces.forEach(s => {
                let sub = s.items.reduce((acc, current) => acc + (current.cant * current.price), 0);
                if(s.variante === 'Base') base += sub;
                else alt += sub;
            });
            document.getElementById('total-base').innerText = '$ ' + base.toLocaleString('es-CO');
            document.getElementById('total-delta').innerText = (alt > 0 ? '+ ' : '') + '$ ' + (alt - base).toLocaleString('es-CO');
        }
        function renderAll() {
            const container = document.getElementById('editor-main');
            const list = document.getElementById('space-list');
            container.innerHTML = '';
            list.innerHTML = '';
            proposalState.spaces.forEach(s => {
                let li = document.createElement('div');
                li.className = 'space-item';
                li.innerHTML = `<span>${s.name}</span><small>${s.variante}</small>`;
                list.appendChild(li);
                let card = document.createElement('div');
                card.className = 'card-espacio';
                card.innerHTML = `
                    <div class="card-header">
                        <input type="text" value="${s.name}" onchange="updateSpaceName(${s.id}, this.value)">
                        <span class="delete-btn" onclick="removeSpace(${s.id})">×</span>
                    </div>
                    <table class="items-table">
                        <thead>
                            <tr>
                                <th style="width: 50%;">Descripción Técnica</th>
                                <th>Cant.</th>
                                <th>P. Unitario</th>
                                <th style="text-align: right;">Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            ${s.items.map((item, idx) => `
                                <tr>
                                    <td><input type="text" value="${item.desc}" oninput="updateItem(${s.id}, ${idx}, 'desc', this.value)"></td>
                                    <td><input type="number" value="${item.cant}" oninput="updateItem(${s.id}, ${idx}, 'cant', this.value)"></td>
                                    <td><input type="number" value="${item.price}" oninput="updateItem(${s.id}, ${idx}, 'price', this.value)"></td>
                                    <td style="text-align: right; font-family: var(--font-technical);">$ ${(item.cant * item.price).toLocaleString()}</td>
                                    <td style="text-align: center;"><span class="delete-btn" onclick="removeItem(${s.id}, ${idx})">−</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <button class="btn-add-line" onclick="addItem(${s.id})">+ Añadir Línea de Cotización</button>
                    <div class="variante-control">
                        Asignar a Variante:
                        <select onchange="updateVariante(${s.id}, this.value)">
                            <option value="Base" ${s.variante === 'Base' ? 'selected' : ''}>Principal (Base)</option>
                            <option value="Alternativa A" ${s.variante === 'Alternativa A' ? 'selected' : ''}>Alternativa A</option>
                            <option value="Alternativa B" ${s.variante === 'Alternativa B' ? 'selected' : ''}>Alternativa B</option>
                        </select>
                    </div>
                `;
                container.appendChild(card);
            });
            updateTotals();
        }
        function updateSpaceName(id, val) {
            const space = proposalState.spaces.find(s => s.id === id);
            space.name = val;
            renderAll();
        }
        function updateVariante(id, val) {
            const space = proposalState.spaces.find(s => s.id === id);
            space.variante = val;
            renderAll();
        }
        function generateJSON() {
            console.log("PROPOSTA_DATA Micelar:", JSON.stringify(proposalState, null, 2));
            alert("Payload Micelar generado en consola. Listo para inyectar a Indra Core.");
        }
        renderAll();
    </script>
    <div class="style-iterator">
        <div class="theme-dot dot-default" title="Axiomatico" onclick="setTheme('default')"></div>
        <div class="theme-dot dot-industrial" title="Industrial Dark" onclick="setTheme('industrial-dark')"></div>
        <div class="theme-dot dot-nordic" title="Nordic Pure" onclick="setTheme('nordic-pure')"></div>
        <div class="theme-dot dot-mono" title="Mono Tech" onclick="setTheme('mono-tech')"></div>
    </div>
    <script>
        function setTheme(theme) {
            if(theme === 'default') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
        }
    </script>
</body>
</html>
