<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas | Veta de Oro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- INFRAESTRUCTURA GLOBAL -->
    <link rel="stylesheet" href="../../../css/system-navigation.css">
    <script src="../../../03-system-infra/core/engines/SystemNavigation.js"></script>
    
    <link rel="stylesheet" href="../../../css/variables.css">
    <link rel="stylesheet" href="../../../css/base.css">
    <link rel="stylesheet" href="../../../css/erp/layout.css">
    <link rel="stylesheet" href="../../../css/erp/buttons.css">
    <link rel="stylesheet" href="../../../css/erp/forms.css">

    <style>
        .blueprint-canvas {
            padding: var(--gap-phi-3);
            display: flex;
            flex-direction: column;
            gap: var(--gap-phi-3);
        }
        .indra-ghost-slot {
            border: 1px dashed var(--color-brass);
            padding: 2px 6px;
            font-family: var(--font-technical);
            font-size: 0.7rem;
            color: var(--color-brass);
            background: rgba(191, 163, 126, 0.05);
        }
    </style>
</head>
<body class="erp-veta axiom-dashboard">

    <div class="blueprint-canvas">
        
        <header class="axiom-flex-row axiom-space-between">
            <h1 class="axiom-title-lg">Módulo Financiero y Contable</h1>
            <div class="v-hud-strip" style="background: var(--color-brass); border: none;">
                <span class="v-hud-label" style="color: white;">CAJA_ACTUAL:</span>
                <span class="technical-data" style="color: white;"><span class="indra-ghost-slot" style="color: white; border-color: white;">[SALDO_GLOBAL_CAJA]</span></span>
            </div>
        </header>

        <section class="axiom-grid-aureo">
            
            <!-- PANEL DE CONTROL: PAGOS Y FACTURAS -->
            <main class="axiom-panel">
                <div class="axiom-flex-row axiom-space-between">
                    <span class="axiom-label">TRANSACCIONES_PROXIMAS_A_VENCER</span>
                    <button class="axiom-btn axiom-btn-sm">+ REGISTRAR PAGO</button>
                </div>
                
                <div style="margin-top: 20px;">
                    <span class="indra-ghost-slot" style="width: 100%; height: 350px; display: flex; align-items: center; justify-content: center;">
                        [TABLA_FINANCIERA_COMPLETA]
                    </span>
                </div>
            </section>

            <!-- PANEL DE SALDOS POR PROYECTO -->
            <aside class="axiom-panel">
                <span class="axiom-label">SALDOS_PENDIENTES_POR_PROYECTO</span>
                <div style="margin-top: 20px; max-height: 400px; overflow-y: auto;">
                    <div class="indra-ghost-slot" style="width: 100%; height: 200px; display: block;">
                        [ITERADOR_DE_SALDOS_CRÍTICOS]
                    </div>
                </div>

                <hr class="axiom-divider">

                <div class="axiom-form-group">
                    <label class="axiom-label">GENERACIÓN_REPORTES_TAX</label>
                    <button class="axiom-btn axiom-btn-ghost" style="width: 100%;">DESCARGAR_BALANCE_MES</button>
                </div>
            </aside>

        </section>

    </div>

</body>
</html>
