<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Inteligencia | Veta de Oro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- INFRAESTRUCTURA GLOBAL -->
    <link rel="stylesheet" href="../../../css/system-navigation.css">
    <script src="../../../03-system-infra/core/engines/SystemNavigation.js"></script>
    
    <link rel="stylesheet" href="../../../css/variables.css">
    <link rel="stylesheet" href="../../../css/base.css">
    <link rel="stylesheet" href="../../../css/erp/layout.css">
    <link rel="stylesheet" href="../../../css/erp/buttons.css">

    <style>
        .blueprint-canvas {
            padding: var(--gap-phi-3);
            display: flex;
            flex-direction: column;
            gap: var(--gap-phi-3);
        }
        .indra-ghost-slot {
            border: 1px dashed var(--color-brass);
            padding: 2px 6px;
            font-family: var(--font-technical);
            font-size: 0.7rem;
            color: var(--color-brass);
            background: rgba(191, 163, 126, 0.05);
        }
    </style>
</head>
<body class="erp-veta axiom-dashboard">

    <div class="blueprint-canvas">
        
        <header class="axiom-flex-row axiom-space-between v-safe-zone">
            <h1 class="axiom-title-lg">Central de Inteligencia</h1>
            <div class="v-hud-strip">
                <span class="v-hud-label">DATA_ENGINE:</span>
                <span class="v-hud-value" style="color: var(--color-brass);">OPTIMUS_v1.0</span>
            </div>
        </header>

        <div class="axiom-grid-3col">
            <article class="axiom-panel">
                <span class="axiom-label">TASA_DE_CONVERSIÓN</span>
                <div class="indra-ghost-slot" style="font-size: 1.5rem; display: block; margin-top: 10px;">[PERCENT_CONVERSION]</div>
            </article>
            <article class="axiom-panel" style="border-left: 2px solid var(--color-brass);">
                <span class="axiom-label">VALOR_DE_VENTAS</span>
                <div class="indra-ghost-slot" style="font-size: 1.5rem; display: block; margin-top: 10px;">[TOTAL_VENTAS]</div>
            </article>
            <article class="axiom-panel">
                <span class="axiom-label">LEADS_ACTIVOS</span>
                <div class="indra-ghost-slot" style="font-size: 1.5rem; display: block; margin-top: 10px;">[COUNT_LEADS]</div>
            </article>
        </div>

        <section class="axiom-panel" style="min-height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <span class="axiom-label" style="margin-bottom: 20px;">PROYECCIÓN_DE_CUMPLIMIENTO</span>
            <div class="indra-ghost-slot" style="width: 100%; min-height: 250px; display: flex; align-items: center; justify-content: center;">
                [GRÁFICA_MAESTRA_DESEMPEÑO]
            </div>
        </section>

    </div>

</body>
</html>
