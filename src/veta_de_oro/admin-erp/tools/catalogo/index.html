<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de Catálogo | Veta de Oro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- INFRAESTRUCTURA GLOBAL -->
    <link rel="stylesheet" href="../../../css/system-navigation.css">
    <script src="../../../03-system-infra/core/engines/SystemNavigation.js"></script>
    
    <link rel="stylesheet" href="../../../css/variables.css">
    <link rel="stylesheet" href="../../../css/base.css">
    <link rel="stylesheet" href="../../../css/erp/layout.css">
    <link rel="stylesheet" href="../../../css/erp/buttons.css">
    <link rel="stylesheet" href="../../../css/erp/forms.css">

    <style>
        .blueprint-canvas {
            padding: var(--gap-phi-3);
            display: flex;
            flex-direction: column;
            gap: var(--gap-phi-3);
        }
        .indra-ghost-slot {
            border: 1px dashed var(--color-brass);
            padding: 2px 6px;
            font-family: var(--font-technical);
            font-size: 0.7rem;
            color: var(--color-brass);
            background: rgba(191, 163, 126, 0.05);
        }
    </style>
</head>
<body class="erp-veta axiom-dashboard">

    <div class="blueprint-canvas">
        
        <header class="axiom-flex-row axiom-space-between v-safe-zone">
            <h1 class="axiom-title-lg">Catálogo Maestro</h1>
            <div class="v-hud-strip">
                <span class="v-hud-label">PRECIOS_REF:</span>
                <span class="v-hud-value"><span class="indra-ghost-slot">[DIVISA_GLOBAL]</span></span>
            </div>
        </header>

        <!-- LAYOUT DE 3 COLUMNAS PARA MÉTRICAS RÁPIDAS -->
        <div class="axiom-grid-3col">
            <article class="axiom-panel">
                <span class="axiom-label">PRODUCTOS_TOTAL</span>
                <div class="indra-ghost-slot" style="font-size: 1.5rem; display: block; margin-top: 10px;">[COUNT_PRODUCTOS]</div>
            </article>
            <article class="axiom-panel">
                <span class="axiom-label">SERVICIOS_ACTIVOS</span>
                <div class="indra-ghost-slot" style="font-size: 1.5rem; display: block; margin-top: 10px;">[COUNT_SERVICIOS]</div>
            </article>
            <article class="axiom-panel">
                <span class="axiom-label">ULTIMA_ACTUALIZACION</span>
                <div class="indra-ghost-slot" style="font-size: 0.9rem; display: block; margin-top: 10px;">[FECHA_SYNC]</div>
            </article>
        </div>

        <section class="axiom-grid-aureo">
            
            <main class="axiom-panel">
                <div class="axiom-flex-row axiom-space-between">
                    <span class="axiom-label">PRODUCTOS_Y_SERVICIOS</span>
                    <button class="axiom-btn axiom-btn-sm">+ AÑADIR_ITEM</button>
                </div>
                <div style="margin-top: 20px;">
                    <span class="indra-ghost-slot" style="width: 100%; min-height: 300px; display: flex; align-items: center; justify-content: center;">
                        [GRID_DINAMICO_CATALOGO]
                    </span>
                </div>
            </main>

            <aside class="axiom-panel">
                <span class="axiom-label">HERRAMIENTAS_DE_PRECIO</span>
                <p class="axiom-text-muted">Ajustes transversales para la generación de cotizaciones.</p>
                
                <div class="axiom-flex-column" style="margin-top: 20px;">
                    <label class="axiom-label">MARGEN_BASE (%)</label>
                    <div class="indra-ghost-slot" style="width: 100%;">[INPUT_MARGEN]</div>
                </div>
            </aside>

        </section>

    </div>

</body>
</html>
