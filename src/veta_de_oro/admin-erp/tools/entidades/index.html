<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Entidades | Veta de Oro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- INFRAESTRUCTURA GLOBAL -->
    <link rel="stylesheet" href="../../../css/system-navigation.css">
    <script src="../../../03-system-infra/core/engines/SystemNavigation.js"></script>
    
    <link rel="stylesheet" href="../../../css/variables.css">
    <link rel="stylesheet" href="../../../css/base.css">
    <link rel="stylesheet" href="../../../css/erp/layout.css">
    <link rel="stylesheet" href="../../../css/erp/buttons.css">
    <link rel="stylesheet" href="../../../css/erp/forms.css">

    <style>
        .blueprint-canvas {
            padding: var(--gap-phi-3);
            display: flex;
            flex-direction: column;
            gap: var(--gap-phi-3);
        }
        .indra-ghost-slot {
            border: 1px dashed var(--color-brass);
            padding: 2px 6px;
            font-family: var(--font-technical);
            font-size: 0.7rem;
            color: var(--color-brass);
            background: rgba(191, 163, 126, 0.05);
        }
    </style>
</head>
<body class="erp-veta axiom-dashboard">

    <div class="blueprint-canvas">
        
        <header class="axiom-flex-row axiom-space-between v-safe-zone">
            <h1 class="axiom-title-lg">Entidades</h1>
            <div class="v-hud-strip">
                <span class="v-hud-label">DATABASE_INDRA</span>
                <span class="v-hud-value"><span class="indra-ghost-slot">[TOTAL_REGISTROS]</span></span>
            </div>
        </header>

        <section class="axiom-grid-inverse">
            
            <!-- PANEL DE FILTROS Y CATEGORÍAS -->
            <aside class="axiom-panel">
                <span class="axiom-label">SEGMENTACIÓN</span>
                <div class="axiom-flex-column" style="margin-top: 15px;">
                    <button class="axiom-btn axiom-btn-sm">PROVEEDORES</button>
                    <button class="axiom-btn axiom-btn-sm">MAQUILA / TERCEROS</button>
                    <button class="axiom-btn axiom-btn-sm">EMPLEADOS</button>
                </div>
                
                <hr class="axiom-divider">
                
                <div class="axiom-flex-column">
                    <label class="axiom-label">BUSCAR_ENTIDAD</label>
                    <input type="text" class="axiom-input" placeholder="Nombre, NIT o ROL...">
                </div>
            </aside>

            <!-- LISTADO MAESTRO -->
            <main class="axiom-panel">
                <div class="axiom-flex-row axiom-space-between">
                    <span class="axiom-label">LISTADO_ACTUALIZADO</span>
                    <button class="axiom-btn axiom-btn-primary">+ NUEVA ENTIDAD</button>
                </div>

                <!-- LISTA DE FILAS FLEXBOX (Reemplaza a la tabla) -->
                <div class="axiom-flex-column" style="margin-top: 20px;">
                    <!-- Cabecera Virtual (Desktop Only) -->
                    <div class="axiom-flex-row axiom-space-between v-safe-zone" style="border-bottom: 2px solid var(--color-ink); padding: 5px 0;">
                        <span class="axiom-label" style="flex: 2;">IDENTIDAD</span>
                        <span class="axiom-label" style="flex: 1; text-align: center;">CATEGORÍA</span>
                        <span class="axiom-label" style="flex: 1; text-align: right;">ESTADO</span>
                    </div>

                    <!-- Iterador de Entidades -->
                    <div class="axiom-flex-column" style="gap: 1px;">
                        <div class="axiom-flex-row axiom-space-between v-safe-zone axiom-panel" style="padding: var(--gap-phi-2); flex-wrap: wrap;">
                            <div style="flex: 2; min-width: 200px;">
                                <span class="indra-ghost-slot" style="display: block;">[RAZÓN_SOCIAL / NOMBRE]</span>
                            </div>
                            <div style="flex: 1; text-align: center; min-width: 100px;">
                                <span class="technical-data">[ROL]</span>
                            </div>
                            <div style="flex: 1; text-align: right; min-width: 100px;">
                                <span class="axiom-btn-sm" style="font-size: 0.6rem;">[ESTADO]</span>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

        </section>

    </div>

</body>
</html>
