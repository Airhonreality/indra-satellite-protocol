<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indra Satellite Protocol // Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- NAVEGACIÓN GLOBAL ERP -->
    <script src="../../../03-system-infra/core/engines/SystemNavigation.js"></script>
    <link rel="stylesheet" href="../../../css/system-navigation.css">

    <style>
        body {
            background-color: #050608;
            color: #e0e0e0;
            margin: 0;
            padding: 80px 40px 40px 40px; /* Ajuste para el header fix */
            font-family: 'Inter', sans-serif;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            margin-bottom: 30px;
            color: #00f2ff;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .status-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .status-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 4px;
        }

        .status-box h3 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 10px 0;
            opacity: 0.5;
        }

        .status-box div {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
        }

        #log-panel {
            height: 150px;
            background: #000;
            border: 1px solid #1a1a1a;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            overflow-y: auto;
            margin-top: 30px;
            color: #00ff00;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Satellite Control Hub // Indra</h1>

        <div class="status-panel">
            <div class="status-box">
                <h3>Bridge Status</h3>
                <div id="bridge-status">INITIALIZING...</div>
            </div>
            <div class="status-box">
                <h3>Contract Mirrors</h3>
                <div id="contract-count">0 PROTOCOLS</div>
            </div>
            <div class="status-box">
                <h3>Active Silos</h3>
                <div id="silo-count">OFFLINE</div>
            </div>
        </div>

        <!-- El Web Component Autónomo -->
        <indra-config-forge id="main-forge"></indra-config-forge>

        <div id="log-panel">
            > [SYSTEM] Satellite ignition sequence started...
        </div>
    </div>

    <!-- Scripts del Semilla Sincronizado -->
    <script type="module">
        import IndraBridge from '../../js/core/IndraBridge.js';
        import WorkflowEngine from '../../js/core/WorkflowEngine.js';
        import ContractReader from '../../js/core/ContractReader.js';
        import './ui/IndraConfigForge.js';

        const logs = document.getElementById('log-panel');
        const log = (msg) => {
            logs.innerHTML += `<br>> ${msg}`;
            logs.scrollTop = logs.scrollHeight;
        };

        async function init() {
            try {
                // 1. Cargar Contrato Local (Ruta actualizada)
                log("[CORE] Cargando contrato mirror...");
                const reader = await ContractReader.loadLocal('../../js/core/indra_contract.json');
                document.getElementById('contract-count').innerText = `${reader.contract.capabilities.protocols.length} PROTOCOLS`;
                
                // 2. Inicializar Bridge
                log("[BRIDGE] Conectando con Indra Core...");
                const bridge = new IndraBridge({
                    coreUrl: 'https://script.google.com/macros/s/AKfycbyhEucpkr6GtpMqQ0LnenhP4SIUXOUJ2M4ycFIVGLBmUuxWYL6hXRTUOBESiC6LlpfA/exec',
                    satelliteToken: 'indra_satellite_omega'
                });
                
                const meta = await bridge.init();
                document.getElementById('bridge-status').innerText = `CONNECTED (v${meta.core_version})`;
                document.getElementById('silo-count').innerText = `${reader.getSilos().length} SILOS ACTIVE`;

                // 3. Cargar Flujo de Ejemplo en la UI
                const res = await fetch('./sample_workflow.json');
                const workflowData = await res.json();
                
                const forge = document.getElementById('main-forge');
                forge.workflow = workflowData;
                log("[UI] Partitura de ejemplo cargada en La Fragua.");

                // Escuchar eventos de la UI
                window.addEventListener('indra-forge-edit', (e) => {
                    log(`[EVENT] Editando estación: ${e.detail.stationId}`);
                    console.log("Datos del flujo:", e.detail.workflow);
                });

            } catch (e) {
                log(`[ERROR] Fallo de ignición: ${e.message}`);
                console.error(e);
            }
        }

        init();
    </script>
</body>
</html>
