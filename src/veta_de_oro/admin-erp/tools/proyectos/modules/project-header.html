<!-- MÓDULO: IDENTIDAD DE PROYECTO (CANÓNICO) -->
<header class="axiom-panel" style="border:none; border-bottom: 2px solid var(--color-ink); border-radius: 0; padding: var(--gap-phi-1) 0;">
    <div class="axiom-flex-row axiom-space-between" style="align-items: flex-end;">
        <div style="flex: 1;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span class="axiom-label">INDRA_ID:</span>
                <span class="technical-data" data-indra-slot="project_id" style="font-size: 0.7rem;">[ID_PROYECTO]</span>
            </div>
            <h1 class="title-signature" data-indra-slot="project_name" style="font-size: 1.5rem; margin: 4px 0 0 0; line-height: 1;">[NOMBRE_PROYECTO]</h1>
            <p class="technical-data" style="opacity: 0.6; margin-top: 2px; font-size: 0.7rem;" data-indra-slot="client_name">CLIENTE: [CLIENTE]</p>
        </div>
        <div class="project-status-block" style="text-align: right;">
            <span class="axiom-label" style="display:block; font-size: 0.6rem;">ESTADO</span>
            <span class="axiom-btn-sm" style="background: var(--color-ink); color: white; padding: 2px 8px; font-size: 0.6rem; border-radius: 2px;" data-indra-slot="project_status">[FASE]</span>
        </div>
    </div>
</header>
