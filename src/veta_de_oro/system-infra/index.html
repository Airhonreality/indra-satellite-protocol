    <script>
      // CONFIGURACIÓN DE ARRANQUE (Axioma: Fallback Seguro)
      window.VETA_CONFIG = {
        CLIENT_ID: '776594248552-3t0g00000000000000000.apps.googleusercontent.com', // Placeholder para GSI
        CORE_URL: 'https://script.google.com/macros/s/AKfycbyhEucpkr6GtpMqQ0LnenhP4SIUXOUJ2M4ycFIVGLBmUuxWYL6hXRTUOBESiC6LlpfA/exec',
        ADMIN_TOKEN: 'indra_satellite_omega'
      };

      // Global Registry para carga secuencial
      window.VETA_REGISTRY = {};
    </script>

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
    body { background-color: var(--color-canvas); color: var(--color-ink); padding: 0; margin: 0; font-family: var(--font-rational); overflow: hidden; }
    .main-workspace { padding: 60px; height: 100vh; overflow-y: auto; background-image: radial-gradient(circle, #E0E0E0 1px, transparent 1px); background-size: 30px 30px; }
    .nexus-header { border-bottom: 1px solid var(--color-boundary); padding-bottom: 30px; margin-bottom: 50px; }
    .tool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
    .forge-card { background: white; border: 1px solid var(--color-boundary); padding: 30px; transition: 0.3s; box-shadow: var(--shadow-sm); border-radius: var(--radius-arch); }
    .status-pill { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; padding: 5px 12px; display: inline-block; margin-bottom: 15px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body class="erp-veta">

    <main class="main-workspace v-safe-zone">
        <header class="nexus-header axiom-flex-row axiom-space-between">
            <div>
                <h1 class="axiom-title-lg">Infraestructura.</h1>
                <p class="axiom-label">GESTIÓN INTEGRAL DE SERVICIOS Y ESQUEMAS</p>
                <div id="target-workspace-selector" style="margin-top: 20px;"></div>
            </div>

            <!-- PORTAL DE ACCESO (Veta OS x Indra) -->
            <div class="axiom-flex-row" style="gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
                <button onclick="window.DBConnector.fetchWorkspaces()" class="axiom-btn axiom-btn-sm" style="background: none; border: 1px solid var(--color-boundary); color: var(--color-ink);">IGNICIÓN MANUAL</button>
                
                <div id="g_id_onload"
                     data-client_id="776594248552-3t0g00000000000000000.apps.googleusercontent.com"
                     data-callback="handleIndraHandshake"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard"></div>
            </div>
        </header>

        <section id="forge-main-container">
            <div class="axiom-grid-3col" id="forge-grid">
                <div style="opacity:0.3" class="technical-data">> Sincronizando con el System Core...</div>
            </div>
        </section>

    </main>

    <!-- CARGA DEL ORQUESTADOR OFICIAL (Protocolo Semilla v1.7) -->
    <script type="module">
        import IndraBridge from './core/IndraBridge.js';
        
        // Inicialización soberana
        window.indra = new IndraBridge({
            coreUrl: window.VETA_CONFIG.CORE_URL,
            satelliteToken: window.VETA_CONFIG.ADMIN_TOKEN
        });

        // HANDSHAKE DINÁMICO (ADR-033 + v1.7 Resonance)
        window.handleIndraHandshake = async (response) => {
            console.log("[VetaOS] Handshake recibido. Iniciando Auto-Discovery...");
            try {
                const success = await window.indra.discover(response.credential);
                
                if (success.ok) {
                    console.log("[VetaOS] ¡Éxito! Core descubierto en Drive:", success.coreUrl);
                    if (window.SystemPanel) {
                        const adminPanel = new window.SystemPanel(window.VETA_REGISTRY);
                        adminPanel.init();
                    }
                }
            } catch (e) {
                console.error("[VetaOS] Fallo en Descubrimiento:", e);
                alert("ERROR_DISCOVERY: Revisa INDRA_MANIFEST.json en tu Drive.");
            }
        };
        
        // Puente de compatibilidad para el legacy DBConnector
        window.DBConnector = {
            fetchWorkspaces: () => window.indra.execute({ provider: 'system', protocol: 'ATOM_READ', context_id: 'workspaces' }).then(r => r.items),
            fetchSchemas: () => window.indra.execute({ provider: 'system', protocol: 'ATOM_READ', context_id: 'schemas' }).then(r => r.items),
            syncSchema: (def, ws) => window.indra.execute({
                provider: 'system',
                protocol: 'ATOM_CREATE',
                workspace_id: ws,
                data: {
                    class: 'DATA_SCHEMA',
                    name: def.label,
                    handle: { alias: def.id, label: def.label, version: def.version },
                    payload: { fields: def.fields, source: 'VETA_SYSTEM_INFRA' }
                }
            }),
            initializeStorage: (id, provider, ws) => window.indra.execute({
                provider: 'system',
                protocol: 'SYSTEM_SCHEMA_IGNITE',
                context_id: id,
                workspace_id: ws,
                data: { target_provider: provider }
            }),
            linkToWorkspace: (ws, atom) => window.indra.execute({
                provider: 'system',
                protocol: 'SYSTEM_PIN',
                workspace_id: ws,
                data: { atom }
            })
        };


        console.log("[VetaOS] IndraBridge (v1.7) Inyectado en root/core.");

        // Inicialización tras inyección de servicios
        if (window.SystemPanel) {
            const adminPanel = new window.SystemPanel(window.VETA_REGISTRY);
            adminPanel.init();
        }
    </script>

    <script src="./core/system-controller.js"></script>
    <script src="./core/system-panel.js"></script>

    </script>

</html>
