<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indra Satellite Protocol // Blueprint Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --indra-bg: #FFFFFF;
            --indra-accent: #1A73E8; /* Azul Google Central */
            --indra-surface: #F8F9FA;
            --indra-text: #3C4043;
            --indra-border: #DADCE0;
        }

        body {
            background-color: var(--indra-surface);
            color: var(--indra-text);
            margin: 0;
            padding: 40px;
            font-family: 'Inter', sans-serif;
            transition: background 0.3s ease;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            margin: 0;
            color: var(--indra-accent);
            text-transform: uppercase;
            letter-spacing: -0.5px;
            font-weight: 700;
        }

        /* Botón de Google Auth (Capa Satélite) */
        .btn-google {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border: 1px solid var(--indra-border);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-google:hover {
            background: #f1f3f4;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        #log-layer {
            margin-top: 40px;
            border-top: 1px solid var(--indra-border);
            padding-top: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>Satellite Control Hub // Indra</h1>
            <button class="btn-google" id="btn-login-google">
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.8 2.72v2.26h2.92c1.71-1.57 2.68-3.89 2.68-6.61z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.55-1.82.88-3.04.88-2.34 0-4.31-1.58-5.02-3.71H.95v2.33C2.43 15.98 5.48 18 9 18z" fill="#34A853"/><path d="M3.98 10.73c-.18-.55-.28-1.13-.28-1.73s.1-1.18.28-1.73V4.94H.95C.35 6.13 0 7.52 0 9s.35 2.87.95 4.06l3.03-2.33z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.47.89 11.43 0 9 0 5.48 0 2.43 2.02.95 4.94l3.03 2.33C4.69 5.16 6.66 3.58 9 3.58z" fill="#EA4335"/></svg>
                Acceder con Google
            </button>
        </header>

        <!-- Estación de Control Soberana (HUD) -->
        <indra-bridge-hud id="main-hud"></indra-bridge-hud>

        <div id="log-layer">
            SATELLITE_STATUS: RESONATING
        </div>
    </div>

    <!-- El Único Punto de Entrada -->
    <script type="module" src="./src/main.js"></script>
</body>
</html>
