<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indra Satellite</title>
    <link rel="stylesheet" href="./src/score/ui/theme.css">
</head>
<body>

    <div id="app-root"></div>

    <script type="module">
        import IndraBridge from './_INDRA_PROTOCOL_/core/IndraBridge.js';
        import { IndraKernel } from './_INDRA_PROTOCOL_/core/IndraKernel.js';
        import { INDRA_NODAL_CONFIG } from './indra_identity.js'; 
        import { ignite } from './src/app.js';             

        async function bootstrap() {
            try {
                const bridge = new IndraBridge({
                    coreUrl: INDRA_NODAL_CONFIG.core_url,
                    satelliteToken: INDRA_NODAL_CONFIG.core_token
                });
                const kernel = new IndraKernel(bridge);
                ignite(bridge, kernel);
                bridge.init();
            } catch (err) {
                console.error("❌ [Portal] CRASH:", err);
            }
        }

        bootstrap();
    </script>
</body>
</html>
